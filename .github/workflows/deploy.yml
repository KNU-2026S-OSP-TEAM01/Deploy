name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "tags/prod.versions"
      - "docker-compose.yml"
      - "scripts/**"

concurrency:
  group: openpark-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout deploy repo
        uses: actions/checkout@v4

      - name: Copy files to prod server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          source: "."
          target: "/opt/landom-deploy"

      - name: Deploy on prod server
        uses: appleboy/ssh-action@v1.0.3

        env:
          PORT_PARKING_LOT_FRONTEND: ${{ secrets.PORT_PARKING_LOT_FRONTEND }}
          PORT_PARKING_LOT_BACKEND: ${{ secrets.PORT_PARKING_LOT_BACKEND }}

          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}

          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          AES_KEY: ${{ secrets.AES_KEY }}
          HMAC_KEY: ${{ secrets.HMAC_KEY }}

          PARKING_LOT_FRONTEND_URL: ${{ secrets.PARKING_LOT_FRONTEND_URL }}
          PARKING_LOT_BACKEND_URL: ${{ secrets.PARKING_LOT_BACKEND_URL }}

          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_PAT: ${{ secrets.GHCR_READ_PAT }}

        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}

          envs: PORT_PARKING_LOT_FRONTEND,PORT_PARKING_LOT_BACKEND,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,SECRET_KEY,AES_KEY,HMAC_KEY,PARKING_LOT_FRONTEND_URL,PARKING_LOT_BACKEND_URL,GHCR_USERNAME,GHCR_READ_PAT

          script: |
            cd /opt/landom-deploy

            echo "$GHCR_READ_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            chmod +x scripts/env.sh scripts/deploy.sh

            ./scripts/deploy.sh prod
